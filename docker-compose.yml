
services:
  postgres:
    image: postgres:15
    container_name: bond_pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: bond_user
      POSTGRES_PASSWORD: bond_pass
      POSTGRES_DB: bond_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  mongo:
    image: mongo:6
    container_name: bond_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  pg_data:
  mongo_data: